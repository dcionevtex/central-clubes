name: Update SPFC News

on:
  schedule:
    # Roda a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite rodar manualmente clicando num botão no GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para commitar no repositório

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd spfc-site
          npm install

      - name: Fetch News
        run: |
          cd projetos/pessoais/central-clubes/spfc-site
          node scripts/fetch-news.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Agente Central SPFC'
          git config --global user.email 'agente@central-spfc.com'
          git add .
          # Só commita se houver mudanças
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(news): Update news content via GitHub Action" && git push)
